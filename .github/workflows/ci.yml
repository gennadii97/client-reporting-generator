name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 \
            libharfbuzz0b \
            libpangoft2-1.0-0 \
            libffi-dev \
            libjpeg-dev \
            libopenjp2-7

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools
          pip install fastapi uvicorn pydantic pydantic-settings \
            sqlalchemy alembic asyncpg celery redis jinja2 weasyprint \
            python-multipart greenlet psycopg2-binary \
            pytest pytest-asyncio httpx ruff mypy aiosqlite \
            slowapi loguru flower faker \
            bcrypt "python-jose[cryptography]" \
            "sentry-sdk[fastapi]" "redis[asyncio]"

      - name: Run linter
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v
